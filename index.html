<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flour Mill Sack Manager</title>
  <style>
    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --brand: #7a5c32;
      --brand-dark: #624824;
      --ok: #166534;
      --warn: #b45309;
      --danger: #991b1b;
      --chip: #f9fafb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0;
      font-size: 1.6rem;
    }

    .sub {
      color: var(--muted);
      margin-top: 6px;
      margin-bottom: 18px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .entry-grid {
      grid-template-columns: 2fr 1fr 1fr auto;
      align-items: end;
    }

    label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    input, select, button {
      font-size: 0.95rem;
      border-radius: 9px;
      border: 1px solid var(--border);
      padding: 10px;
    }

    input, select {
      width: 100%;
      background: #fff;
    }

    .btn {
      cursor: pointer;
      border: none;
      color: #fff;
      background: var(--brand);
      font-weight: 600;
      padding: 10px 12px;
      white-space: nowrap;
    }

    .btn:hover { background: var(--brand-dark); }

    .btn-secondary {
      background: #f3f4f6;
      color: #111827;
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
      border: 1px solid #fecaca;
    }

    .toolbar {
      grid-template-columns: 2fr 1fr auto;
      align-items: end;
    }

    .rate-note {
      color: var(--muted);
      font-size: 0.86rem;
      margin-top: 6px;
    }

    .pay-box {
      border: 1px dashed #d6c7af;
      background: #fffaf3;
      border-radius: 10px;
      padding: 8px 10px;
      min-width: 150px;
    }

    .pay-box span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 2px;
    }

    .pay-box strong {
      color: #7c2d12;
      font-size: 1rem;
    }

    .stats {
      grid-template-columns: repeat(6, 1fr);
    }

    .metric {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: #fafaf9;
    }

    .metric span { color: var(--muted); font-size: 0.85rem; }
    .metric strong { display: block; font-size: 1.25rem; margin-top: 2px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      text-align: left;
    }

    th {
      background: #faf7f2;
      color: #374151;
      font-weight: 700;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      font-size: 0.76rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 4px 8px;
      border: 1px solid transparent;
      background: var(--chip);
    }

    .chip.pending { color: #4b5563; border-color: #d1d5db; }
    .chip.delivered { color: var(--ok); border-color: #86efac; background: #f0fdf4; }
    .chip.pending-payment { color: var(--warn); border-color: #fdba74; background: #fff7ed; }
    .chip.paid { color: #1d4ed8; border-color: #93c5fd; background: #eff6ff; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .actions button {
      padding: 6px 9px;
      font-size: 0.8rem;
    }

    .small {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 3px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 10px;
    }

    @media (max-width: 900px) {
      .entry-grid, .toolbar, .stats { grid-template-columns: 1fr; }
      .wrap { padding: 12px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>🌾 Flour Mill Sack Manager</h1>
    <p class="sub">Record customer sacks and track delivery/payment clearly.</p>

    <section class="card">
      <form id="entryForm" class="grid entry-grid">
        <div>
          <label for="customerName">Customer Name</label>
          <input id="customerName" required maxlength="80" placeholder="e.g. Ramesh Kumar" />
        </div>
        <div>
          <label for="weight">Weight (kg)</label>
          <input id="weight" required type="number" min="0.1" step="0.1" placeholder="e.g. 42.5" />
        </div>
        <div>
          <label for="purpose">Purpose</label>
          <select id="purpose" required>
            <option value="Aatta">Aatta</option>
            <option value="Daliya">Daliya</option>
          </select>
        </div>
        <div>
          <button class="btn" type="submit" id="saveBtn">Add Entry</button>
        </div>
        <div class="pay-box">
          <span>Calculated Payable</span>
          <strong id="payablePreview">₹0.00</strong>
        </div>
      </form>
      <div class="rate-note">Rates: Aatta grinding ₹3/kg, Daliya ₹1.5/kg.</div>
    </section>

    <section class="card">
      <div class="grid toolbar">
        <div>
          <label for="search">Search Customer</label>
          <input id="search" placeholder="Type customer name..." />
        </div>
        <div>
          <label for="statusFilter">Filter Status</label>
          <select id="statusFilter">
            <option value="all">All</option>
            <option value="pending-delivery">Pending Delivery</option>
            <option value="delivered-paid">Delivered + Paid</option>
            <option value="delivered-unpaid">Delivered + Payment Pending</option>
          </select>
        </div>
        <div>
          <button id="exportBtn" type="button" class="btn btn-secondary">Export CSV</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div id="stats" class="grid stats"></div>
    </section>

    <section class="card">
      <table>
        <thead>
          <tr>
            <th>Customer</th>
            <th>Weight</th>
            <th>Purpose</th>
            <th>Payable</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'flour-mill-sacks-v2';
    const form = document.getElementById('entryForm');
    const rowsEl = document.getElementById('rows');
    const statsEl = document.getElementById('stats');
    const searchEl = document.getElementById('search');
    const statusFilterEl = document.getElementById('statusFilter');
    const exportBtn = document.getElementById('exportBtn');
    const payablePreviewEl = document.getElementById('payablePreview');

    const state = {
      entries: loadEntries(),
      editingId: null
    };

    form.addEventListener('submit', onSubmit);
    searchEl.addEventListener('input', render);
    statusFilterEl.addEventListener('change', render);
    exportBtn.addEventListener('click', exportCSV);
    document.getElementById('weight').addEventListener('input', updatePayablePreview);
    document.getElementById('purpose').addEventListener('change', updatePayablePreview);

    function onSubmit(event) {
      event.preventDefault();

      const customerName = document.getElementById('customerName').value.trim();
      const weight = Number(document.getElementById('weight').value);
      const purpose = document.getElementById('purpose').value;

      if (!customerName) {
        alert('Please enter customer name.');
        return;
      }

      if (!Number.isFinite(weight) || weight <= 0) {
        alert('Please enter a valid weight greater than 0.');
        return;
      }

      if (state.editingId) {
        state.entries = state.entries.map((entry) => entry.id === state.editingId
          ? { ...entry, customerName, weight, purpose, updatedAt: new Date().toISOString() }
          : entry
        );
        state.editingId = null;
        document.getElementById('saveBtn').textContent = 'Add Entry';
      } else {
        state.entries.unshift({
          id: crypto.randomUUID(),
          customerName,
          weight,
          purpose,
          delivered: false,
          paid: false,
          createdAt: new Date().toISOString(),
          updatedAt: null
        });
      }

      form.reset();
      document.getElementById('purpose').value = 'Aatta';
      updatePayablePreview();
      persist();
      render();
    }

    function getRate(purpose) {
      return purpose === 'Daliya' ? 1.5 : 3;
    }

    function calculateAmount(weight, purpose) {
      const numericWeight = Number(weight);
      if (!Number.isFinite(numericWeight) || numericWeight <= 0) return 0;
      return numericWeight * getRate(purpose);
    }

    function formatINR(amount) {
      return `₹${Number(amount).toFixed(2)}`;
    }

    function updatePayablePreview() {
      const weight = Number(document.getElementById('weight').value);
      const purpose = document.getElementById('purpose').value;
      payablePreviewEl.textContent = formatINR(calculateAmount(weight, purpose));
    }

    function loadEntries() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
    }

    function getStatus(entry) {
      if (!entry.delivered) return 'pending-delivery';
      if (entry.delivered && entry.paid) return 'delivered-paid';
      return 'delivered-unpaid';
    }

    function filteredEntries() {
      const query = searchEl.value.trim().toLowerCase();
      const filter = statusFilterEl.value;

      return state.entries.filter((entry) => {
        const matchQuery = !query || entry.customerName.toLowerCase().includes(query);
        const status = getStatus(entry);
        const matchFilter = filter === 'all' || filter === status;
        return matchQuery && matchFilter;
      });
    }

    function toggleDelivered(id) {
      state.entries = state.entries.map((entry) => {
        if (entry.id !== id) return entry;
        const delivered = !entry.delivered;
        return {
          ...entry,
          delivered,
          paid: delivered ? entry.paid : false,
          updatedAt: new Date().toISOString()
        };
      });
      persist();
      render();
    }

    function togglePaid(id) {
      state.entries = state.entries.map((entry) => {
        if (entry.id !== id) return entry;
        if (!entry.delivered) return entry;
        return {
          ...entry,
          paid: !entry.paid,
          updatedAt: new Date().toISOString()
        };
      });
      persist();
      render();
    }

    function startEdit(id) {
      const entry = state.entries.find((e) => e.id === id);
      if (!entry) return;
      state.editingId = id;

      document.getElementById('customerName').value = entry.customerName;
      document.getElementById('weight').value = entry.weight;
      document.getElementById('purpose').value = entry.purpose;
      document.getElementById('saveBtn').textContent = 'Update Entry';
      updatePayablePreview();
      document.getElementById('customerName').focus();
    }

    function cancelEdit() {
      state.editingId = null;
      form.reset();
      document.getElementById('purpose').value = 'Aatta';
      document.getElementById('saveBtn').textContent = 'Add Entry';
      updatePayablePreview();
    }

    function removeEntry(id) {
      const entry = state.entries.find((e) => e.id === id);
      if (!entry) return;

      const ok = confirm(`Delete entry for ${entry.customerName}?`);
      if (!ok) return;

      state.entries = state.entries.filter((entry) => entry.id !== id);
      if (state.editingId === id) cancelEdit();
      persist();
      render();
    }

    function chips(entry) {
      if (!entry.delivered) {
        return '<span class="chip pending">Pending Delivery</span>';
      }

      if (entry.paid) {
        return '<span class="chip delivered">Delivered</span><span class="chip paid">Paid</span>';
      }

      return '<span class="chip delivered">Delivered</span><span class="chip pending-payment">Payment Pending</span>';
    }

    function metric(label, value) {
      return `<div class="metric"><span>${label}</span><strong>${value}</strong></div>`;
    }

    function renderStats(entries) {
      const total = entries.length;
      const delivered = entries.filter((e) => e.delivered).length;
      const paid = entries.filter((e) => e.paid).length;
      const pendingPayment = entries.filter((e) => e.delivered && !e.paid).length;
      const totalWeight = entries.reduce((sum, e) => sum + Number(e.weight || 0), 0).toFixed(1);
      const totalPayable = entries.reduce((sum, e) => sum + calculateAmount(e.weight, e.purpose), 0);

      statsEl.innerHTML = [
        metric('Visible Entries', total),
        metric('Delivered', delivered),
        metric('Paid', paid),
        metric('Payment Pending', pendingPayment),
        metric('Total Weight (kg)', totalWeight),
        metric('Total Payable (₹)', Number(totalPayable).toFixed(2))
      ].join('');
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDate(dateString) {
      if (!dateString) return '';
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString();
    }

    function render() {
      const entries = filteredEntries();
      renderStats(entries);

      if (!entries.length) {
        rowsEl.innerHTML = '<tr><td class="empty" colspan="6">No matching entries.</td></tr>';
        return;
      }

      rowsEl.innerHTML = entries.map((entry) => {
        const timestamp = entry.updatedAt || entry.createdAt;
        const meta = timestamp ? `<div class="small">Updated: ${escapeHTML(formatDate(timestamp))}</div>` : '';

        return `
          <tr>
            <td><strong>${escapeHTML(entry.customerName)}</strong><div class="small">Payable: ${formatINR(calculateAmount(entry.weight, entry.purpose))}</div>${meta}</td>
            <td>${escapeHTML(entry.weight)} kg</td>
            <td>${escapeHTML(entry.purpose)}</td>
            <td>${formatINR(calculateAmount(entry.weight, entry.purpose))}</td>
            <td><div class="chips">${chips(entry)}</div></td>
            <td>
              <div class="actions">
                <button type="button" class="btn-secondary" onclick="toggleDelivered('${entry.id}')">${entry.delivered ? 'Undeliver' : 'Deliver'}</button>
                <button type="button" class="btn-secondary" onclick="togglePaid('${entry.id}')" ${entry.delivered ? '' : 'disabled'}>${entry.paid ? 'Unpay' : 'Mark Paid'}</button>
                <button type="button" class="btn-secondary" onclick="startEdit('${entry.id}')">Edit</button>
                <button type="button" class="btn-danger" onclick="removeEntry('${entry.id}')">Delete</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function exportCSV() {
      const entries = filteredEntries();
      if (!entries.length) {
        alert('No entries to export.');
        return;
      }

      const header = ['Customer Name', 'Weight (kg)', 'Purpose', 'Payable (Rs)', 'Delivered', 'Paid', 'Payment Pending', 'Updated At'];
      const lines = entries.map((entry) => [
        entry.customerName,
        entry.weight,
        entry.purpose,
        calculateAmount(entry.weight, entry.purpose).toFixed(2),
        entry.delivered ? 'Yes' : 'No',
        entry.paid ? 'Yes' : 'No',
        entry.delivered && !entry.paid ? 'Yes' : 'No',
        formatDate(entry.updatedAt || entry.createdAt)
      ]);

      const csv = [header, ...lines]
        .map((row) => row.map((v) => `"${String(v).replaceAll('"', '""')}"`).join(','))
        .join('\n');

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `sacks-${new Date().toISOString().slice(0, 10)}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }

    window.toggleDelivered = toggleDelivered;
    window.togglePaid = togglePaid;
    window.removeEntry = removeEntry;
    window.startEdit = startEdit;

    updatePayablePreview();
    render();
  </script>
</body>
</html>
